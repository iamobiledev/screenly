services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      APP_URL: ${APP_URL:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-}
      PROCESSOR_MODE: ${PROCESSOR_MODE:-manual}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-screenly}
      S3_BUCKET: ${S3_BUCKET:-screenly}
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-screenly-local-development-secret}
      SESSION_SECRET: ${SESSION_SECRET:-screenly-local-session-secret-change-me}
      UPLOAD_API_TOKEN: ${UPLOAD_API_TOKEN:-screenly-local-upload-token-change-me}
      WORKSPACE_PASSWORD: ${WORKSPACE_PASSWORD:-screenly-local-password}
    ports:
      - "3000:3000"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-screenly}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-screenly-local-development-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: /bin/sh
    command:
      - -c
      - >
        until mc alias set local http://minio:9000
        "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 1; done;
        mc mb --ignore-existing local/"$${S3_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-screenly}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-screenly-local-development-secret}
      S3_BUCKET: ${S3_BUCKET:-screenly}

  worker:
    profiles:
      - processor
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      HLS_THRESHOLD_SECONDS: ${HLS_THRESHOLD_SECONDS:-1200}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-screenly}
      S3_BUCKET: ${S3_BUCKET:-screenly}
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-screenly-local-development-secret}
      VIDEO_ID: ${VIDEO_ID:-00000000-0000-0000-0000-000000000000}
    depends_on:
      minio-init:
        condition: service_completed_successfully

volumes:
  minio-data:
