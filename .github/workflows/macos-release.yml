name: Release macOS recorder

on:
  pull_request:
    paths:
      - "apps/mac/**"
      - ".github/workflows/macos-release.yml"
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.2.0
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - "apps/mac/**"
      - ".github/workflows/macos-release.yml"
    tags:
      - "internal-v*"

permissions:
  contents: read

jobs:
  build-notarize-publish:
    # macOS 26 runners ship the Xcode 26 SDK, which is required for the
    # recorder to adopt the native Liquid Glass appearance.
    runs-on: macos-26
    timeout-minutes: 45
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      version: ${{ steps.release.outputs.version }}
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MAC_BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release settings
        id: release
        run: |
          signing_configured=true
          required_signing_variables=(
            APPLE_ID
            APPLE_APP_PASSWORD
            APPLE_TEAM_ID
            CERTIFICATE_P12_BASE64
            CERTIFICATE_PASSWORD
          )
          for variable in "${required_signing_variables[@]}"; do
            if [[ -z "${!variable:-}" ]]; then
              signing_configured=false
            fi
          done

          version="$(
            awk -F '"' '/MARKETING_VERSION:/ { print $2; exit }' \
              apps/mac/project.yml
          )"
          publish_release=false
          unsigned_build=true

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#internal-v}"
            version="${tag_version%%-build*}"
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            publish_release=true
          elif [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            publish_release=true
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid macOS release version: $version"
            exit 1
          fi

          if [[ "$publish_release" == "true" &&
                "$signing_configured" == "true" ]]; then
            unsigned_build=false
          fi

          echo "MAC_UNSIGNED_BUILD=$unsigned_build" >> "$GITHUB_ENV"
          echo "MAC_APP_VERSION=$version" >> "$GITHUB_ENV"
          echo "publish=$publish_release" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Explain ad-hoc-signed release
        if: >-
          steps.release.outputs.publish == 'true' &&
          env.MAC_UNSIGNED_BUILD == 'true'
        run: |
          echo "::warning::Apple signing credentials are incomplete; publishing an ad-hoc-signed build that requires Control-click → Open."
          {
            echo "### Publishing an ad-hoc-signed macOS release"
            echo
            echo "Apple signing credentials are incomplete."
            echo "Users must approve this build with **Control-click → Open**."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install build tools
        run: brew install xcodegen

      - name: Import Developer ID certificate
        if: env.MAC_UNSIGNED_BUILD != 'true'
        run: |
          keychain_path="$RUNNER_TEMP/screenly-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$CERTIFICATE_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$CERTIFICATE_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychain -d user -s "$keychain_path" login.keychain-db
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$CERTIFICATE_PASSWORD" \
            "$keychain_path"

      - name: Build, sign, and notarize
        run: bash apps/mac/scripts/build-release.sh

      - name: Preserve release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Screenly-${{ steps.release.outputs.version }}
          path: |
            apps/mac/build/release/Screenly.dmg
            apps/mac/build/release/Screenly.dmg.sha256
          if-no-files-found: error

  publish-release:
    name: Publish desktop release
    needs: build-notarize-publish
    if: needs.build-notarize-publish.outputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    env:
      GCP_DEPLOYER_KEY: ${{ secrets.GCP_DEPLOYER_KEY }}
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      RELEASE_BUCKET: ${{ vars.MAC_RELEASE_STORAGE_BUCKET }}
      VERSION: ${{ needs.build-notarize-publish.outputs.version }}
    steps:
      - name: Authenticate to Google Cloud (service account key)
        if: env.GCP_DEPLOYER_KEY != ''
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_DEPLOYER_KEY }}

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        if: env.GCP_DEPLOYER_KEY == ''
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Download verified release artifact
        uses: actions/download-artifact@v4
        with:
          name: Screenly-${{ needs.build-notarize-publish.outputs.version }}
          path: release

      - name: Publish versioned and latest downloads
        run: |
          bucket="${RELEASE_BUCKET:-screenly-media-$PROJECT_ID}"
          sha256="$(awk '{ print $1 }' release/Screenly.dmg.sha256)"
          echo "$sha256  release/Screenly.dmg" | sha256sum --check
          metadata="version=$VERSION,sha256=$sha256"

          gcloud storage cp \
            release/Screenly.dmg \
            "gs://$bucket/releases/Screenly-$VERSION.dmg" \
            --project "$PROJECT_ID" \
            --content-type application/x-apple-diskimage \
            --cache-control private,max-age=31536000,immutable \
            --custom-metadata "$metadata"
          gcloud storage cp \
            release/Screenly.dmg \
            "gs://$bucket/releases/Screenly-latest.dmg" \
            --project "$PROJECT_ID" \
            --content-type application/x-apple-diskimage \
            --cache-control private,max-age=300 \
            --custom-metadata "$metadata"
          gcloud storage cp \
            release/Screenly.dmg.sha256 \
            "gs://$bucket/releases/Screenly-latest.dmg.sha256" \
            --project "$PROJECT_ID" \
            --content-type text/plain \
            --cache-control private,max-age=300
