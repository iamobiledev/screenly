name: Release macOS recorder

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.2.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-notarize-publish:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      MAC_APP_VERSION: ${{ inputs.version }}
      MAC_BUILD_NUMBER: ${{ github.run_number }}
      AWS_ACCESS_KEY_ID: ${{ secrets.MAC_RELEASE_S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.MAC_RELEASE_S3_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.MAC_RELEASE_S3_REGION }}
      MAC_RELEASE_S3_URI: ${{ vars.MAC_RELEASE_S3_URI }}
      S3_ENDPOINT_URL: ${{ vars.MAC_RELEASE_S3_ENDPOINT }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install xcodegen awscli

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          keychain_path="$RUNNER_TEMP/screenly-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$CERTIFICATE_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$CERTIFICATE_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychain -d user -s "$keychain_path" login.keychain-db
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$CERTIFICATE_PASSWORD" \
            "$keychain_path"

      - name: Build, sign, and notarize
        run: bash apps/mac/scripts/build-release.sh

      - name: Publish versioned and latest downloads
        run: |
          endpoint_args=()
          if [[ -n "${S3_ENDPOINT_URL:-}" ]]; then
            endpoint_args+=(--endpoint-url "$S3_ENDPOINT_URL")
          fi
          release_dir="apps/mac/build/release"
          aws "${endpoint_args[@]}" s3 cp \
            "$release_dir/Screenly.dmg" \
            "$MAC_RELEASE_S3_URI/Screenly-$MAC_APP_VERSION.dmg"
          aws "${endpoint_args[@]}" s3 cp \
            "$release_dir/Screenly.dmg" \
            "$MAC_RELEASE_S3_URI/Screenly-latest.dmg"
          aws "${endpoint_args[@]}" s3 cp \
            "$release_dir/Screenly.dmg.sha256" \
            "$MAC_RELEASE_S3_URI/Screenly-latest.dmg.sha256"

      - name: Preserve release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Screenly-${{ inputs.version }}
          path: |
            apps/mac/build/release/Screenly.dmg
            apps/mac/build/release/Screenly.dmg.sha256
          if-no-files-found: error
