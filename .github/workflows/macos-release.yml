name: Release macOS recorder

on:
  pull_request:
    paths:
      - "apps/mac/**"
      - ".github/workflows/macos-release.yml"
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.2.0
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - "apps/mac/**"
      - ".github/workflows/macos-release.yml"
    tags:
      - "internal-v*"

permissions:
  contents: read

jobs:
  build-notarize-publish:
    # macOS 26 runners ship the Xcode 26 SDK, which is required for the
    # recorder to adopt the native Liquid Glass appearance.
    runs-on: macos-26
    timeout-minutes: 45
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MAC_BUILD_NUMBER: ${{ github.run_number }}
      AWS_ACCESS_KEY_ID: ${{ secrets.MAC_RELEASE_STORAGE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.MAC_RELEASE_STORAGE_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.MAC_RELEASE_STORAGE_REGION }}
      MAC_RELEASE_STORAGE_URI: ${{ vars.MAC_RELEASE_STORAGE_URI }}
      STORAGE_ENDPOINT_URL: ${{ vars.MAC_RELEASE_STORAGE_ENDPOINT }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release settings
        id: release
        run: |
          release_configured=true
          required_release_variables=(
            APPLE_ID
            APPLE_APP_PASSWORD
            APPLE_TEAM_ID
            CERTIFICATE_P12_BASE64
            CERTIFICATE_PASSWORD
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            AWS_DEFAULT_REGION
            MAC_RELEASE_STORAGE_URI
          )
          for variable in "${required_release_variables[@]}"; do
            if [[ -z "${!variable:-}" ]]; then
              release_configured=false
            fi
          done

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#internal-v}"
            echo "MAC_UNSIGNED_BUILD=true" >> "$GITHUB_ENV"
            echo "MAC_PUBLISH_RELEASE=false" >> "$GITHUB_ENV"
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            echo "MAC_UNSIGNED_BUILD=false" >> "$GITHUB_ENV"
            echo "MAC_PUBLISH_RELEASE=true" >> "$GITHUB_ENV"
          else
            version="$(
              awk -F '"' '/MARKETING_VERSION:/ { print $2; exit }' \
                apps/mac/project.yml
            )"
            if [[ "$GITHUB_EVENT_NAME" == "push" &&
                  "$release_configured" == "true" ]]; then
              echo "MAC_UNSIGNED_BUILD=false" >> "$GITHUB_ENV"
              echo "MAC_PUBLISH_RELEASE=true" >> "$GITHUB_ENV"
            else
              echo "MAC_UNSIGNED_BUILD=true" >> "$GITHUB_ENV"
              echo "MAC_PUBLISH_RELEASE=false" >> "$GITHUB_ENV"
            fi
          fi
          echo "MAC_APP_VERSION=$version" >> "$GITHUB_ENV"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Explain skipped automatic release
        if: >-
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          env.MAC_PUBLISH_RELEASE != 'true'
        run: |
          echo "::warning::Release credentials are incomplete; building an unsigned verification artifact without publishing."
          {
            echo "### macOS release not published"
            echo
            echo "Release credentials or storage settings are incomplete."
            echo "This run will verify the app with an unsigned build only."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate publish configuration
        if: env.MAC_PUBLISH_RELEASE == 'true'
        run: |
          missing=()
          required_release_variables=(
            APPLE_ID
            APPLE_APP_PASSWORD
            APPLE_TEAM_ID
            CERTIFICATE_P12_BASE64
            CERTIFICATE_PASSWORD
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            AWS_DEFAULT_REGION
            MAC_RELEASE_STORAGE_URI
          )
          for variable in "${required_release_variables[@]}"; do
            if [[ -z "${!variable:-}" ]]; then
              missing+=("$variable")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing release configuration: ${missing[*]}"
            exit 1
          fi

      - name: Install build tools
        run: brew install xcodegen awscli

      - name: Import Developer ID certificate
        if: env.MAC_PUBLISH_RELEASE == 'true'
        run: |
          keychain_path="$RUNNER_TEMP/screenly-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$CERTIFICATE_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$CERTIFICATE_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychain -d user -s "$keychain_path" login.keychain-db
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$CERTIFICATE_PASSWORD" \
            "$keychain_path"

      - name: Build, sign, and notarize
        run: bash apps/mac/scripts/build-release.sh

      - name: Publish versioned and latest downloads
        if: env.MAC_PUBLISH_RELEASE == 'true'
        run: |
          endpoint_args=()
          if [[ -n "${STORAGE_ENDPOINT_URL:-}" ]]; then
            endpoint_args+=(--endpoint-url "$STORAGE_ENDPOINT_URL")
          fi
          release_dir="apps/mac/build/release"
          sha256="$(awk '{ print $1 }' "$release_dir/Screenly.dmg.sha256")"
          release_metadata="version=$MAC_APP_VERSION,sha256=$sha256"
          aws "${endpoint_args[@]}" s3 cp \
            "$release_dir/Screenly.dmg" \
            "$MAC_RELEASE_STORAGE_URI/Screenly-$MAC_APP_VERSION.dmg" \
            --content-type application/x-apple-diskimage \
            --metadata "$release_metadata"
          aws "${endpoint_args[@]}" s3 cp \
            "$release_dir/Screenly.dmg" \
            "$MAC_RELEASE_STORAGE_URI/Screenly-latest.dmg" \
            --content-type application/x-apple-diskimage \
            --metadata "$release_metadata"
          aws "${endpoint_args[@]}" s3 cp \
            "$release_dir/Screenly.dmg.sha256" \
            "$MAC_RELEASE_STORAGE_URI/Screenly-latest.dmg.sha256"

      - name: Preserve release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Screenly-${{ steps.release.outputs.version }}
          path: |
            apps/mac/build/release/Screenly.dmg
            apps/mac/build/release/Screenly.dmg.sha256
          if-no-files-found: error
