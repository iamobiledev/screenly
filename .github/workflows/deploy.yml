# Automatically deploys the web service and processing job to Google
# Cloud Run whenever anything is merged into main.
#
# One-time setup (see the "Continuous deployment" section of the README):
#   Repository variables:
#     GCP_PROJECT_ID                 Google Cloud project id
#     GCP_REGION                     e.g. us-central1
#     GCP_WORKLOAD_IDENTITY_PROVIDER projects/<number>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
#     GCP_DEPLOY_SERVICE_ACCOUNT     deployer service account email
#     CLOUD_SQL_INSTANCE             project:region:instance (only for migrations)
#     CLOUD_RUN_SERVICE              optional, defaults to screenly-web
#     CLOUD_RUN_JOB                  optional, defaults to screenly-processor
#   Repository secrets:
#     DATABASE_URL                   optional; enables the migration step
#
# Until GCP_PROJECT_ID is configured the deploy job is skipped, so the
# workflow stays green on forks and unconfigured clones.

name: Deploy to production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Test, lint, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm through Corepack
        run: corepack enable

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy to Cloud Run
    needs: verify
    if: vars.GCP_PROJECT_ID != ''
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE != '' && vars.CLOUD_RUN_SERVICE || 'screenly-web' }}
      JOB_NAME: ${{ vars.CLOUD_RUN_JOB != '' && vars.CLOUD_RUN_JOB || 'screenly-processor' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet

      - name: Build and push web image
        run: |
          image="$REGION-docker.pkg.dev/$PROJECT_ID/screenly/web"
          docker build \
            --file apps/web/Dockerfile \
            --tag "$image:$GITHUB_SHA" \
            --tag "$image:latest" \
            .
          docker push --all-tags "$image"

      - name: Build and push worker image
        run: |
          image="$REGION-docker.pkg.dev/$PROJECT_ID/screenly/worker"
          docker build \
            --file apps/worker/Dockerfile \
            --tag "$image:$GITHUB_SHA" \
            --tag "$image:latest" \
            .
          docker push --all-tags "$image"

      # Applies committed Drizzle migrations before the new revision serves
      # traffic. DATABASE_URL is used directly for managed Postgres providers
      # (for example Neon); when CLOUD_SQL_INSTANCE is also configured, the
      # Cloud SQL Auth Proxy is started first and DATABASE_URL should point at
      # 127.0.0.1:5432.
      - name: Run database migrations
        if: env.DATABASE_URL != ''
        env:
          CLOUD_SQL_INSTANCE: ${{ vars.CLOUD_SQL_INSTANCE }}
        run: |
          if [[ -n "${CLOUD_SQL_INSTANCE:-}" ]]; then
            curl --fail --silent --show-error --location --output cloud-sql-proxy \
              https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.2/cloud-sql-proxy.linux.amd64
            chmod +x cloud-sql-proxy
            ./cloud-sql-proxy "$CLOUD_SQL_INSTANCE" --port 5432 &
            proxy_pid=$!
            trap 'kill "$proxy_pid"' EXIT
            for _ in $(seq 1 30); do
              if (exec 3<>/dev/tcp/127.0.0.1/5432) 2>/dev/null; then
                exec 3>&-
                break
              fi
              sleep 1
            done
          fi
          corepack enable
          pnpm install --frozen-lockfile --filter @screenly/web...
          pnpm db:migrate

      - name: Deploy web service
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/screenly/web:${{ github.sha }}

      - name: Update processing job
        run: |
          gcloud run jobs update "$JOB_NAME" \
            --image "$REGION-docker.pkg.dev/$PROJECT_ID/screenly/worker:$GITHUB_SHA" \
            --region "$REGION" \
            --quiet

      - name: Check service health
        run: |
          url="$(gcloud run services describe "$SERVICE_NAME" \
            --region "$REGION" \
            --format 'value(status.url)')"
          echo "Service URL: $url"
          curl --fail --silent --show-error --retry 5 --retry-delay 5 \
            "$url/api/health"
